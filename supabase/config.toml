# Supabase local development — https://supabase.com/docs/guides/cli
project_id = "stilldesk"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Microsoft Entra ID (Azure AD) — set secrets in .env for local CLI or Supabase Dashboard for hosted
[auth.external.azure]
enabled = false
client_id = "env(AZURE_CLIENT_ID)"
secret = "env(AZURE_CLIENT_SECRET)"
url = "https://login.microsoftonline.com/common"
